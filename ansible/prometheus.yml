---
- name: Install Prometheus
  hosts: prometheus
  become: yes

  tasks:
    - name: Create directories
      file:
        path: "{{ item.path }}"
        state: "{{ item.state }}"
        owner: "ubuntu"
        group: "ubuntu"
        mode: '0755'
      loop:
        - { path: /opt/prometheus,        state: directory }
        - { path: /etc/prometheus,        state: directory }
        - { path: /var/lib/prometheus,    state: directory }
          
    - name: Download Prometheus
      get_url:
        url: https://github.com/prometheus/prometheus/releases/download/v2.45.0/prometheus-2.45.0.linux-amd64.tar.gz
        dest: /tmp/prometheus.tar.gz
        force: yes

    - name: Extract Prometheus
      unarchive:
        src: /tmp/prometheus.tar.gz
        dest: /opt/prometheus/
        remote_src: yes
        extra_opts: [--strip-components=1]

    - name: Copy configuration
      template:
        src: templates/prometheus.yml.j2
        dest: /etc/prometheus/prometheus.yml

    - name: Create systemd service
      copy:
        src: files/prometheus.service
        dest: /etc/systemd/system/prometheus.service

    - name: Start Prometheus
      systemd:
        name: prometheus
        enabled: yes
        state: started
