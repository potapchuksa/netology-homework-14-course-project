---
- name: Install Elasticsearch from local .deb
  hosts: elastic
  become: yes

  tasks:
    - name: Install required dependencies
      apt:
        name:
          - openjdk-17-jre-headless
          - ca-certificates
        state: present
        update_cache: yes

    - name: Copy Elasticsearch .deb package to target
      copy:
        src: files/elasticsearch-9.1.5-amd64.deb
        dest: /tmp/elasticsearch.deb
        mode: '0644'

    - name: Install Elasticsearch
      apt:
        deb: /tmp/elasticsearch.deb
        state: present

    - name: Configure elasticsearch.yml for single-node development
      lineinfile:
        path: /etc/elasticsearch/elasticsearch.yml
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        backup: yes
      loop:
        - { regexp: '^#?network.host:', line: 'network.host: 0.0.0.0' }
        - { regexp: '^#?discovery.type:', line: 'discovery.type: single-node' }
        - { regexp: '^cluster\.initial_master_nodes', line: '# cluster' }

    - name: Enable and start Elasticsearch service
      systemd:
        name: elasticsearch
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait a bit for Elasticsearch to initialize internal security
      pause:
        seconds: 30

    - name: Reset elastic user password and capture it
      command: /usr/share/elasticsearch/bin/elasticsearch-reset-password -u elastic --auto --batch
      register: reset_result
      changed_when: "'New value:' in reset_result.stdout"

    - name: Extract generated password (from stdout in ES 9+)
      set_fact:
        elastic_password: "{{ reset_result.stdout_lines | select('match', '.*New value:.*') | map('regex_replace', '.*New value: (.*)', '\\1') | first }}"
      when: reset_result.stdout_lines is defined and reset_result.stdout_lines | select('match', '.*New value:.*') | list | length > 0

    - name: Reset kibana_system user password and capture it
      command: /usr/share/elasticsearch/bin/elasticsearch-reset-password -u kibana_system --auto --batch
      register: reset_kibana
      changed_when: "'New value:' in reset_kibana.stdout"

    - name: Extract kibana_system password
      set_fact:
        kibana_system_password: "{{ reset_kibana.stdout_lines | select('match', '.*New value:.*') | map('regex_replace', '.*New value: (.*)', '\\1') | first }}"
      when: reset_kibana.stdout_lines is defined and reset_kibana.stdout_lines | select('match', '.*New value:.*') | list | length > 0

    - name: Save password to vault file (on control node)
      delegate_to: localhost
      become: no
      copy:
        content: |
          vault_elastic_password: "{{ elastic_password }}"
          vault_kibana_system_password: "{{ kibana_system_password }}"
        dest: "{{ playbook_dir }}/vault_elastic.yml"
        mode: '0600'
      no_log: true
      when: elastic_password is defined

